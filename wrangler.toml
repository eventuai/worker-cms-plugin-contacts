name = "worker-cms-plugin-contacts"
main = "src/index.ts"
compatibility_date = "2026-07-14"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# Admin view templates (LiquidJS + JSON templates, mirroring the CMS). The Worker
# runs first for every request and reads these internally via the VIEWS binding,
# so the files are never served publicly.
[assets]
directory = "./views"
binding = "VIEWS"
run_worker_first = true

# The CMS forwards this secret on every hook / admin / publish call.
# Set it to the same value as the CMS's PLUGIN_SECRET:
#   wrangler secret put PLUGIN_SECRET

# ── Multi-tenant mode (several CMS hosts → this one plugin) ────────────────────
# Bind a KV namespace with one record per connected CMS; CMS_URL/PLUGIN_SECRET
# then become an optional legacy fallback tenant:
#   wrangler kv key put --binding TENANTS "tenant:https://cms1.example.com" \
#     '{"secret":"<32-byte hex, unique per CMS>"}'
[[kv_namespaces]]
binding = "TENANTS"
id = "1521c17b90364899ba3280926029b0af"